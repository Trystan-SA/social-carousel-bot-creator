<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./theme.css">
  <style>
    .slide { background: radial-gradient(circle at 30% 20%, #1E293B, #0F172A); }
    .hook { color: var(--text); }
    .hook strong { color: var(--primary); }
    .eyebrow { letter-spacing: 6px; text-transform: uppercase; font-size: 28px; font-weight: 600; color: var(--primary); }
    .swipe { font-family: var(--font-handwritten); font-size: 48px; color: var(--accent); }
  </style>
</head>
<body>
  <div class="slide">
    <div class="content flex-col gap-48 items-center">
      <span class="eyebrow">Postkit</span>
      <h1 class="heading heading-xl hook">
        Ship carousels<br>in <strong>minutes</strong>,<br>not hours.
      </h1>
      <span class="swipe">swipe →</span>
    </div>
    <span class="watermark">@postkit</span>
  </div>
</body>
</html>
