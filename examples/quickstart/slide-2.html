<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./theme.css">
  <style>
    .row { display: flex; align-items: center; gap: 40px; text-align: left; }
    .row .label { font-family: var(--font-display); font-weight: 700; font-size: 44px; color: var(--text); }
    .row .desc { font-size: 30px; color: var(--text-muted); line-height: 1.4; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="content flex-col gap-64">
      <h2 class="heading heading-lg">Three commands,<br>zero config.</h2>

      <div class="flex-col gap-48 w-full" style="max-width: 840px; margin: 0 auto;">
        <div class="row">
          <div class="tip-number">1</div>
          <div>
            <div class="label">postkit init</div>
            <div class="desc">Scaffold the project</div>
          </div>
        </div>
        <div class="row">
          <div class="tip-number">2</div>
          <div>
            <div class="label">postkit new my-post</div>
            <div class="desc">Create a post folder</div>
          </div>
        </div>
        <div class="row">
          <div class="tip-number">3</div>
          <div>
            <div class="label">postkit render my-post</div>
            <div class="desc">Export PNGs ready to upload</div>
          </div>
        </div>
      </div>
    </div>
    <span class="watermark">@postkit</span>
  </div>
</body>
</html>
